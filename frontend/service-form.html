<!DOCTYPE html>
<html>

<head>

    <title>Pawlendar | Registration</title>
    <link rel="stylesheet" href="registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>


</head>


<div class="register-container">




    <div class="register-left">


        <div class="logo">
            <i class="fa-solid fa-paw"></i> Pawlendar
        </div>

        <h1>
            Manage Grooming Services
        </h1>

        <p>
            Create new grooming services for customers. Fill in the service details,
            pricing, and estimated duration before saving them to the catalog.
        </p>


        <div class="pet-image">

            <img src="images/trixie.jpg" alt="Cutie cat">

        </div>


    </div>




    <div class="register-right">


        <h2>
            Add New Service
        </h2>

        <p class="subtitle">
            Fill in the details below to add a new grooming service to the Pawlendar catalog.
        </p>

        <form>

            <div class="input-group">
                <label>
                    Service Name
                </label>

                <input
                    type="text"
                    placeholder="Enter service name">
            </div>

            <div class="input-group">
                <label>
                    Category
                </label>

                <select>
                    <option>Select a category</option>
                    <option>Bath & Grooming</option>
                    <option>Hair Styling</option>
                    <option>Treatment</option>
                    <option>Spa Package</option>
                    <option>Add-on Service</option>
                </select>
            </div>

            <div class="input-group">
                <label>
                    Service Description
                </label>

                <textarea
                    rows="5"
                    placeholder="Describe the service..."></textarea>
            </div>

            <div class="input-row">

                <div class="input-group">

                    <label>
                        Price (₱)
                    </label>

                    <input
                        type="number"
                        placeholder="2000">

                </div>

                <div class="input-group">

                    <label>
                        Duration (Minutes)
                    </label>

                    <input
                        type="number"
                        placeholder="90">

                </div>

            </div>

            <button
                type="submit">
                Save Service
            </button>

        </form>
    </div>
</div>

</body>
</html>
