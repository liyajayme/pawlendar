<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawlendar | Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="left-panel">
            <div class="logo-area">
                <span class="paw-icon">🐾</span>
                <span class="brand-name">Pawlendar</span>
            </div>
            
            <h1 class="welcome-text">Welcome Back!</h1>
            <p class="sub-text">Log in to keep track of your furry friend's grooming schedule.</p>
            
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=600" alt="Cute Dog" class="pet-image">
            </div>
        </div>

        <div class="right-panel">
            <div class="form-box">
                <h2 class="form-title">Log In</h2>
                <p class="form-subtitle">Enter your credentials to access your account.</p>

                <form>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="forgot-pass">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-login">Log In</button>
                </form>

                <p class="switch-page">Don't have an account? <a href="registration.html">Register</a></p>
            </div>
        </div>
    </div>

</body>
</html>
