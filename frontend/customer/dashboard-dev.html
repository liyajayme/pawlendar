<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pawlendar | Dashboard</title>

    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="dashboard-dev.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body data-active-nav="overview">

    <main class="dashboard-layout">

        <!-- CONTENT -->
        <aside class="sidebar">

            <div class="sidebar-profile">

                <div class="profile-picture-ring">
                    <img src="images/default-profile.svg"
                        alt="Profile Picture"
                        class="profile-picture">
                </div>

                <p class="welcome-text">Welcome!</p>

                <h2 class="owner-name">Loading...</h2>

                <div class="owner-contact">

                    <p class="owner-email">
                        <i class="fa-solid fa-envelope"></i>
                        <span>Loading...</span>
                    </p>

                    <p class="owner-phone">
                        <i class="fa-solid fa-phone"></i>
                        <span>Loading...</span>
                    </p>

                </div>

            </div>

            <nav class="sidebar-nav">

                <a href="dashboard-dev.html" class="nav-item active">
                    <div class="nav-icon">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <span>Overview</span>
                </a>

                <a href="add-pets-menu.html" class="nav-item">
                    <div class="nav-icon">
                        <i class="fa-solid fa-paw"></i>
                    </div>
                    <span>Pets</span>
                </a>

                <a href="appointments-menu.html" class="nav-item">
                    <div class="nav-icon">
                        <i class="fa-solid fa-calendar-days"></i>
                    </div>
                    <span>Appointments</span>
                </a>

                <a href="#" id="logoutBtn" class="nav-item logout">
                    <div class="nav-icon">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <span>Log Out</span>
                </a>

            </nav>

        </aside>

        <section class="content-panel">

            <div class="content-wrapper">

                <header class="dashboard-header">

                    <h1>Dashboard Overview</h1>

                    <p>
                        Welcome back! Here's what's happening with your pets today.
                    </p>

                </header>

                <hr>

                <!-- PETS -->

                <section class="pets-section">

                    <div class="section-header">

                        <h3>My Pets</h3>

                        <a href="#">View All</a>

                    </div>

                    <div class="pet-grid">

                        <div class="pet-list">
                            <!-- pets inserted here -->
                        </div>

                        <a href="add-pets-menu.html" class="pet-card add-pet-card">
                            <i class="fa-solid fa-plus"></i>
                            <span>Add Pet</span>
                        </a>

                    </div>

                </section>

                <hr>

                <!-- APPOINTMENTS -->

                <section class="appointments-section">

                    <div class="section-header">

                        <h3>Upcoming Appointments</h3>

                        <a href="#">View Calendar</a>

                    </div>

                    <div class="appointments-grid">

                    </div>

                </section>

            </div>

        </section>

    </main>

    <script src="dashboard-dev.js"></script>
</body>

</html>
