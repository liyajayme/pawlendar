<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pawlendar | Dashboard</title>

    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="appointments-menu.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="../paw-pattern.css">
</head>

<body>

    <main class="dashboard-layout">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="sidebar-profile">

                <div class="profile-picture-ring">
                    <img src="images/default-profile.svg"
                        alt="Profile Picture"
                        class="profile-picture">
                </div>

                <p class="welcome-text">Welcome!</p>

                <h2 class="owner-name">Loading...</h2>

                <div class="owner-contact">

                    <p class="owner-email">
                        <i class="fa-solid fa-envelope"></i>
                        <span>Loading...</span>
                    </p>

                    <p class="owner-phone">
                        <i class="fa-solid fa-phone"></i>
                        <span>Loading...</span>
                    </p>

                </div>

            </div>

            <nav class="sidebar-nav">

                <a href="dashboard-dev.html" class="nav-item">
                    <div class="nav-icon">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <span>Overview</span>
                </a>

                <a href="add-pets-menu.html" class="nav-item">
                    <div class="nav-icon">
                        <i class="fa-solid fa-paw"></i>
                    </div>
                    <span>Pets</span>
                </a>

                <a href="appointments-menu.html" class="nav-item active">
                    <div class="nav-icon">
                        <i class="fa-solid fa-calendar-days"></i>
                    </div>
                    <span>Appointments</span>
                </a>

                <a href="#" id="logoutBtn" class="nav-item logout">
                    <div class="nav-icon">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <span>Log Out</span>
                </a>

            </nav>

        </aside>

        <!-- CONTENT -->

        <section class="content-panel">

            <div class="content-wrapper">

                <header class="dashboard-header">

                    <h1>Appointments</h1>

                    <p>
                        View and manage all of your grooming appointments.
                    </p>

                </header>

                <hr>

                <section class="appointments-page">

                    <div class="appointments-toolbar">

                        <input
                            type="text"
                            placeholder="Search appointments..."
                        >

                        <button class="search-btn">
                            Book Appointment
                        </button>

                    </div>

                    <div class="appointments-grid">

                        <div class="appointment-card">
                            <h3>July 20, 2026</h3>
                            <p>9:00 AM – 10:00 AM</p>

                            <hr>

                            <p><strong>Pet:</strong> Bruno</p>
                            <p><strong>Groomer:</strong> John Smith</p>
                            <p><strong>Total:</strong> ₱650.00</p>
                            <p><strong>Payment:</strong> Pending</p>

                            <span class="status pending">Scheduled</span>

                            <div class="appointment-actions">
                                <button class="primary-btn">View</button>
                                <button
                                    class="secondary-btn"
                                    data-id="${appointment.appointment_id}">
                                    Cancel
                                </button>
                            </div>
                        </div>

                        </div>

                    </div>
                    

                </section>

            </div>

        </section>

    </main>

    <script src="appointments-menu.js"></script>
    
</body>

</html>
