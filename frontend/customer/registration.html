<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawlendar | Registration</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <header class="navbar">

        <a href="index.html" class="brand brand-dark">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <ellipse cx="15" cy="18" rx="6.5" ry="5.5" fill="var(--clay)" />
                <circle cx="8.5" cy="9.5" r="3" fill="var(--clay)" />
                <circle cx="15" cy="6.5" r="3" fill="var(--clay)" />
                <circle cx="21.5" cy="9.5" r="3" fill="var(--clay)" />
            </svg>
            <span>Pawlendar</span>
        </a>

        <nav class="nav-list">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="service.html">Services</a>
            <a href="staff-info.html">Staff</a>
            <a href="appointment.html">Appointments</a>
        </nav>

        <div class="nav-auth">
            <a href="login.html" class="btn-ghost-small">Login</a>
            <a href="registration.html" class="btn-gold">Sign Up</a>
        </div>

    </header>

    <div class="register-container">
        <div class="register-left paws-bg">

            <div class="logo">
                <i class="fa-solid fa-paw"></i> Pawlendar
            </div>

            <h1>Join Pawlendar Today!</h1>

            <p>
                Create your account and start taking
                better care of your furry friends!
            </p>


            <div class="pet-image">
                <img src="../images/trixie.jpg" alt="Cutie cat">

            </div>
        </div>

        <div class="register-right">
            <h2>
                Create Account
            </h2>

            <p class="subtitle">
                Register to schedule your pet's grooming appointments.
            </p>

            <form id="registerForm">
                <div class="input-row">

                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" id="first_name" placeholder="Enter your first name" required>
                    </div>

                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" id="last_name" placeholder="Enter your last name" required>
                    </div>

                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone_number" placeholder="09XXXXXXXXX" required>
                    </div>

                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create password" required>
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm_password" placeholder="Confirm password" required>
                    </div>

                </div>

                <button type="submit">Register</button>

            </form>

            <p class="login-text">Already have an account? <a href="login.html">Login</a></p>
        </div>

    </div>

    <script src="service-2.js"></script>
    <script src="registration.js"></script>
</body>

</html>
