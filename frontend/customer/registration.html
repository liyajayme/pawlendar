<!DOCTYPE html>
<html>

<head>

    <title>Pawlendar | Registration</title>
    <link rel="stylesheet" href="registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>


</head>


<div class="register-container">




    <div class="register-left">


        <div class="logo">
            <i class="fa-solid fa-paw"></i> Pawlendar
        </div>


        <h1>
            Join Pawlendar Today!
        </h1>


        <p>
            Create your account and start taking
            better care of your furry friends! 
        </p>


        <div class="pet-image">

            <img src="../images/trixie.jpg" alt="Cutie cat">

        </div>


    </div>




    <div class="register-right">


        <h2>
            Create Account
        </h2>


        <p class="subtitle">
            Register to schedule your pet's grooming appointments.
        </p>



        <form id="registerForm">


            <div class="input-row">

                <div class="input-group">
                    <label>First Name</label>

                    <input
                        type="text"
                        id="first_name"
                        placeholder="Enter your first name"
                        required>
                </div>

                <div class="input-group">
                    <label>Last Name</label>

                    <input
                        type="text"
                        id="last_name"
                        placeholder="Enter your last name"
                        required>
                </div>

            </div>

            <div class="input-row">

                <div class="input-group">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="input-group">

                    <label>Phone Number</label>

                    <input
                        type="text"
                        id="phone_number"
                        placeholder="09XXXXXXXXX"
                        required>

                </div>

                <div class="input-group">

                    <label>Street Address</label>

                    <input
                        type="text"
                        id="street_address"
                        placeholder="House No., Street"
                        required>

                </div>

            </div>

            <div class="input-row">

                <div class="input-group">

                    <label>Barangay</label>

                    <input
                        type="text"
                        id="barangay"
                        placeholder="Enter barangay"
                        required>

                </div>

                <div class="input-group">

                    <label>City</label>

                    <input
                        type="text"
                        id="city"
                        placeholder="Enter city"
                        required>

                </div>

                <div class="input-group">

                    <label>Province</label>

                    <input
                        type="text"
                        id="province"
                        placeholder="Enter province"
                        required>

                </div>

            </div>

            <div class="input-row">

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Create password"
                        required>

                </div>

                <div class="input-group">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        id="confirm_password"
                        placeholder="Confirm password"
                        required>

                </div>

            </div>

            <button type="submit">
                Register
            </button>



        </form>




        <p class="login-text">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>



    </div>



</div>

<script src="registration.js"></script>


</body>


</html>
