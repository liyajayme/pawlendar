<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawlendar | Login </title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="navbar.css">
</head>
<body>
    <header class="navbar">

        <a href="index.html" class="brand brand-dark">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <ellipse cx="15" cy="18" rx="6.5" ry="5.5" fill="var(--clay)" />
                <circle cx="8.5" cy="9.5" r="3" fill="var(--clay)" />
                <circle cx="15" cy="6.5" r="3" fill="var(--clay)" />
                <circle cx="21.5" cy="9.5" r="3" fill="var(--clay)" />
            </svg>
            <span>Pawlendar</span>
        </a>

        <nav class="nav-list">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="service.html">Services</a>
            <a href="staff-info.html">Staff</a>
            <a href="appointment.html">Appointments</a>
        </nav>

        <div class="nav-auth">
            <a href="login.html" class="btn-ghost-small">Login</a>
            <a href="registration.html" class="btn-gold">Sign Up</a>
        </div>

    </header>

    <div class="main-container">
        <div class="left-panel paws-bg">
            <div class="logo-area">
                <i class="fa-solid fa-paw"></i>
                <span class="brand-name">Pawlendar</span>
            </div>
            
            <h1 class="welcome-text">Welcome Back!</h1>
            <p class="sub-text">Log in to keep track of your furry friend's grooming schedule.</p>
            
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=600" alt="Cute Dog" class="pet-image">
            </div>
        </div>

        <div class="right-panel">
            <div class="form-box">
                <h2 class="form-title">Log In</h2>
                <p class="form-subtitle">Enter your credentials to access your account.</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="forgot-pass">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-login">Log In</button>
                </form>

                <p class="switch-page">Don't have an account? <a href="registration.html">Register</a></p>
                <a href="../admin/admin-login.html" class="admin-access">Admin Login</a>
            </div>
        </div>
    </div>

    <script src="service-2.js"></script>
    <script src="login.js"></script>
</body>
</html>
