<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pawlendar | Edit Staff</title>

    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="admin-staff.css">

</head>


<body>

<div id="app" style="display:none;">


    <header class="navbar">

        <a href="admin-dashboard.html" class="brand brand-dark">

            <span>Pawlendar</span>

        </a>


        <nav class="nav-list">

            <a href="admin-dashboard.html">
                Dashboard
            </a>

            <a href="admin-appointment.html">
                Appointments
            </a>

            <a href="admin-calendar.html">
                Calendar
            </a>

            <a href="admin-services.html">
                Services
            </a>

            <a href="admin-staff.html">
                Staff
            </a>

        </nav>


        <div class="nav-auth">

            <a href="#" id="logoutBtn" class="btn-ghost-small">
                Logout
            </a>

        </div>


    </header>



    <main class="appointments-dashboard">


        <div class="table-container">


            <h2>Edit Groomer</h2>


            <form id="staffEditForm">


                <div class="form-row two-columns">


                    <div class="input-group">

                        <label>
                            First Name
                        </label>

                        <input
                            type="text"
                            id="first_name"
                            required>

                    </div>



                    <div class="input-group">

                        <label>
                            Last Name
                        </label>

                        <input
                            type="text"
                            id="last_name"
                            required>

                    </div>


                </div>




                <div class="form-row two-columns">


                    <div class="input-group">

                        <label>
                            Email
                        </label>


                        <input
                            type="email"
                            id="email">

                    </div>




                    <div class="input-group">

                        <label>
                            Phone Number
                        </label>


                        <input
                            type="text"
                            id="phone_number"
                            maxlength="15"
                            required>

                    </div>


                </div>





                <div class="form-row two-columns">


                    <div class="input-group">

                        <label>
                            Specialization
                        </label>


                        <input
                            type="text"
                            id="specialization"
                            required>

                    </div>





                    <div class="input-group">

                        <label>
                            Hire Date
                        </label>


                        <input
                            type="date"
                            id="hire_date"
                            required>

                    </div>


                </div>



                <p
                id="formError"
                class="form-error"
                style="display:none;">
                </p>




                <div class="panel-buttons">


                    <a
                    href="admin-staff.html"
                    class="outline-btn">

                        Cancel

                    </a>



                    <button
                    type="submit"
                    class="main-btn">

                        Update Staff

                    </button>


                </div>


            </form>


        </div>


    </main>


</div>



<script src="admin-staff-form-edit.js"></script>


</body>

</html>
