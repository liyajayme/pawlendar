<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawlendar | Appointment Management</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="admin-appointment.css">
    <link rel="stylesheet" href="../navbar.css">
</head>

<body>

    <div id="app" style="display:none;">

        <header class="navbar">
            <a href="index.html" class="brand brand-dark">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                    <ellipse cx="15" cy="18" rx="6.5" ry="5.5" fill="var(--clay)" />
                    <circle cx="8.5" cy="9.5" r="3" fill="var(--clay)" />
                    <circle cx="15" cy="6.5" r="3" fill="var(--clay)" />
                    <circle cx="21.5" cy="9.5" r="3" fill="var(--clay)" />
                </svg>
                <span>Pawlendar</span>
            </a>

            <nav class="nav-list">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-appointment.html">Appointments</a>
                <a href="admin-calendar.html">Calendar</a>
                <a href="admin-services.html">Services</a>
                <a href="admin-staff.html">Staff</a>
            </nav>

            <div class="nav-auth">
                <a href="#" id="logoutBtn" class="btn-ghost-small">Logout</a>
            </div>
        </header>

        <section class="appointments-hero paws-bg">
            <div class="appointments-hero-content">
                <h1>Appointment Management</h1>

                <p>
                    Manage grooming appointments and update their progress
                    from check-in until completion.
                </p>
            </div>
        </section>

        <section class="appointments-dashboard">

            <h2>Appointment List</h2>

            <div class="appointment-filters">

                <input type="text" id="searchInput" placeholder="Search pet or owner...">

                <select id="statusFilter">
                    <option value="All">All Status</option>
                    <option>Scheduled</option>
                    <option>Checked In</option>
                    <option>In Progress</option>
                    <option>Ready for Pickup</option>
                    <option>Completed</option>
                    <option>Cancelled</option>
                </select>

                <select id="dateFilter">
                    <option value="all">All Dates</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>

            </div>

            <div class="table-container">

                <table class="appointment-table">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Pet</th>
                            <th>Owner</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Groomer</th>
                            <th>Status</th>
                            <th>Payment</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="appointmentTableBody">

                    </tbody>

                </table>

            </div>

        </section>
    </div>
    <script src="admin-appointment.js"></script>

</body>

</html>
