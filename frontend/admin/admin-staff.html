<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Pawlendar | Staff Management</title>

        <link rel="stylesheet" href="../navbar.css">
        <link rel="stylesheet" href="admin-staff.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    </head>

    <body>

    <div id="app" style="display:none;">

        <header class="navbar">

            <a href="admin-dashboard.html" class="brand brand-dark">
                <span>Pawlendar</span>
            </a>

            <nav class="nav-list">

                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-appointment.html">Appointments</a>
                <a href="admin-calendar.html">Calendar</a>
                <a href="admin-services.html">Services</a>
                <a href="admin-staff.html">Staff</a>

            </nav>

            <div class="nav-auth">
                <a href="#" id="logoutBtn">Logout</a>
            </div>

        </header>


        <section class="appointments-hero paws-bg">

            <div class="appointments-hero-content">

                <h1>Staff Management</h1>

                <p>
                    View groomers and their weekly availability.
                </p>

            </div>

        </section>



        <section class="appointments-dashboard">

            <h2>Groomers</h2>

            <div class="appointment-filters">

                <input
                type="text"
                id="searchInput"
                placeholder="Search groomer...">

                <button id="addBtn">
                <i class="fa fa-plus"></i>
                Add Groomer
                </button>

            </div>


            <div class="table-container">

                <table class="appointment-table">

                <thead>

                    <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Action</th>

                    </tr>

                </thead>

                <tbody id="staffTableBody"></tbody>

                </table>

            </div>

            </section>


            <section
            id="staffDetails"
            style="display:none;"
            class="appointments-dashboard">

            <h2>Groomer Details</h2>

            <div id="detailsContainer"></div>

        </section>

    </div>

    <script src="admin-staff.js"></script>

    </body>
</html>
