<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pawlendar | Staff Management</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="../paw-pattern.css">
    <link rel="stylesheet" href="admin-staff.css">

</head>


<body>


<div id="app" style="display:none;">


<header class="navbar">

    <a href="admin-dashboard.html" class="brand brand-dark">

        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <ellipse cx="15" cy="18" rx="6.5" ry="5.5" fill="var(--clay)" />
            <circle cx="8.5" cy="9.5" r="3" fill="var(--clay)" />
            <circle cx="15" cy="6.5" r="3" fill="var(--clay)" />
            <circle cx="21.5" cy="9.5" r="3" fill="var(--clay)" />
        </svg>

        <span>Pawlendar</span>

    </a>


    <nav class="nav-list">

        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-appointment.html">Appointments</a>
        <a href="admin-calendar.html">Calendar</a>
        <a href="admin-services.html">Services</a>
        <a href="admin-staff.html">Staff</a>

    </nav>


    <div class="nav-auth">

        <a href="#" id="logoutBtn" class="btn-ghost-small">
            Logout
        </a>

    </div>


</header>




<section class="staff-hero paws-bg">


    <div class="staff-content">

        <h1>
            Staff Management
        </h1>


        <p>
            Manage groomers, their information, and weekly availability.
        </p>


        <a href="admin-staff-form.html" class="add-staff-btn">

            <i class="fa-solid fa-plus"></i>

            Add Groomer

        </a>


    </div>


</section>






<section class="staff-wrapper">


<div class="staff-card">


<div class="staff-title">


<h2>
    Groomers
</h2>


<input 
    type="text"
    id="searchInput"
    placeholder="Search groomer..."
>


</div>





<table class="staff-table">


<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>

</tr>

</thead>



<tbody id="staffTableBody">

</tbody>



</table>



</div>


</section>






<section id="staffDetails" style="display:none;">


<div class="staff-wrapper">


<div class="staff-card">


<h2>
Groomer Details
</h2>


<div id="detailsContainer"></div>


</div>


</div>


</section>




</div>



<script src="admin-staff.js"></script>


</body>

</html>
